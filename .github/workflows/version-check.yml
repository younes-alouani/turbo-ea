name: Version sync check

# Fails a PR if VERSION is bumped without a matching '## [<version>]' section
# in CHANGELOG.md. The Publish-GitHub-Release workflow can't cut release notes
# without that section, so catching the drift at PR time prevents a broken
# release tag later.
#
# Documentation-only PRs (every changed file is `.md`, plus VERSION /
# CHANGELOG.md themselves) skip the strict enforcement — they still bump
# VERSION per project convention, but the gate isn't worth blocking a pure
# docs PR on if the contributor forgot the matching CHANGELOG heading.

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect docs-only PR
        id: docs_only
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          base_sha=$(git rev-parse FETCH_HEAD)
          non_docs=$(git diff --name-only "${base_sha}...HEAD" \
            | grep -vE '(\.md$|^VERSION$|^CHANGELOG\.md$)' || true)
          if [[ -z "$non_docs" ]]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
            echo "PR touches only Markdown / VERSION / CHANGELOG — skipping enforcement."
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
            echo "Non-docs files changed; running version/changelog check:"
            echo "$non_docs"
          fi

      - name: Verify CHANGELOG has matching section
        if: steps.docs_only.outputs.result != 'true'
        run: |
          set -euo pipefail
          version=$(cat VERSION)
          if [[ -z "$version" ]]; then
            echo "::error file=VERSION::VERSION file is empty"
            exit 1
          fi
          escaped="${version//./\\.}"
          if ! grep -qE "^## \[${escaped}\]" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::CHANGELOG.md has no '## [${version}]' section."
            echo "Bumping VERSION to ${version} requires a matching '## [${version}] - YYYY-MM-DD' entry in CHANGELOG.md."
            echo "Without it, the Publish-GitHub-Release workflow will fail when this version is tagged."
            exit 1
          fi
          echo "OK: CHANGELOG.md contains '## [${version}]'"
