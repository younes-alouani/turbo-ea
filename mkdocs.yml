# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  - admonition                     # Note / Warning / Tip callout boxes
  - pymdownx.details               # Collapsible admonitions (??? note)
  - pymdownx.superfences            # Fenced code blocks, diagrams
  - pymdownx.tabbed:                # Content tabs
      alternate_style: true
  - attr_list                       # HTML attributes on elements
  - md_in_html                      # Markdown inside HTML blocks
  - tables                          # Pipe tables
  - toc:
      permalink: true               # Anchor links on headings

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav:
