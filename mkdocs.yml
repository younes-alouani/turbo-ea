# =============================================================================
# Turbo EA — User Manual (MkDocs Material + i18n)
# =============================================================================
# Docs:  https://squidfunk.github.io/mkdocs-material/
# i18n:  https://github.com/ultrabug/mkdocs-static-i18n
# =============================================================================

site_name: Turbo EA — User Manual
site_description: User manual for Turbo EA – Enterprise Architecture Management Platform
site_url: https://docs.turbo-ea.org

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
theme:
  name: material
  language: en
  features:
    - navigation.tabs              # Top-level sections as tabs
    - navigation.sections          # Collapsible sidebar sections
    - navigation.top               # Back-to-top button
    - navigation.indexes           # Section index pages (index.md)
    - navigation.expand            # Auto-expand sidebar sections
    - search.suggest               # Search autocomplete
    - search.highlight             # Highlight search terms on page
    - content.code.copy            # Copy button on code blocks
    - toc.integrate                # TOC in left sidebar
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    logo: material/book-open-page-variant

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  # i18n — suffix-based: page.md (EN), page.es.md (ES), page.de.md (DE)…
